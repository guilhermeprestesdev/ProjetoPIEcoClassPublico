<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="icon" type="image/svg+xml" href="imagens/logo 3.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoClassMaterial</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div id="header-placeholder"></div>

    <br>
    <div class="page-container">
        <div class="filter-panel">
            <label for="categoria">Categoria</label>
            <select id="categoria">
                <!-- Opções geradas via JS -->
            </select>

            <label for="tipo-material">Material</label>
            <input type="text" id="tipo-material" name="tipo-material" placeholder="Digite o tipo de material">

            <label>Qualidade Minima</label>
            <div class="doar-stars" id="filter-stars" style="justify-content: flex-start; gap: 5px;">
                <span class="filter-star" data-value="1">★</span>
                <span class="filter-star" data-value="2">★</span>
                <span class="filter-star" data-value="3">★</span>
                <span class="filter-star" data-value="4">★</span>
                <span class="filter-star" data-value="5">★</span>
            </div>
            <input type="hidden" id="filter-rating-value" value="0">

            <button type="button" class="receber-submit-btn" id="btn-pesquisar"
                style="margin-top: 15px;">Pesquisar</button>
        </div>

        <div id="cards-container" class="cards-container">



        </div>
    </div>

    <div id="footer-placeholder"></div>

    <div id="modalSolicitacao" class="receber-modal">
        <div class="receber-modal-content">
            <span class="close-modal">&times;</span>
            <div class="receber-container" style="margin-top: 0; box-shadow: none;">
                <form id="solicitacaoFormModal">
                    <label>Categoria</label>
                    <input type="text" id="modal-categoria" readonly>

                    <label>Material</label>
                    <input type="text" id="modal-item" readonly>

                    <div class="receber-image-upload">
                        <img id="modal-img" src="" class="receber-image-upload">
                    </div>

                    <label>Descrição</label>
                    <textarea id="modal-descricao" readonly></textarea>

                    <label>Estado do Material</label>
                    <div class="receber-stars" id="modal-stars">
                    </div>


                    <button type="submit" class="receber-submit-btn">Solicitar</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
