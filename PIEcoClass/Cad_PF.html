<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Pessoa Física</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>


    <script src="script.js"></script>
    
    <div id="header-placeholder"></div>

    <div class="cad-main-content">
        <div class="cad-container">
            <h1>CRIAR CONTA</h1>

            <div class="account-type-toggle">
                <button class="active">Pessoa Física</button>
                <button id="btnPessoaJuridica">Pessoa Jurídica</button>
            </div>

            <form id="formPessoaFisica" novalidate>
                <div class="cad-form-group">
                    <label for="nome" class="required-label">Nome</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu Nome Completo" maxlength="100"
                        required>
                </div>

                <div class="cad-form-row">
                    <div class="cad-form-group">
                        <label for="cpf" class="required-label">CPF</label>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00"  minlength="14"    maxlength="14" required>
                    </div>
                    <div class="cad-form-group">
                        <label for="nascimento" class="required-label">Nascimento</label>
                        <input type="date" id="nascimento" name="nascimento" required>
                    </div>
                </div>



                <div class="cad-form-row">
                    <div class="cad-form-group">
                        <label for="contato" class="required-label">Contato</label>
                        <input type="tel" id="contato" name="contato" placeholder="(00) 00000-0000" minlength="15" maxlength="15" required>
                    </div>
                    <div class="cad-form-group">
                        <label for="email" class="required-label">Email</label>
                        <input type="email" id="email" name="email" placeholder="Digite seu email" required>
                    </div>
                </div>

                <h2>Endereço</h2>
                <div class="cad-form-row">
                    <div class="cad-form-group cad-short">
                        <label for="cep" class="required-label">CEP</label>
                        <input type="text" id="cep" name="cep" placeholder="00000-000" minlength="10" maxlength="10" required>
                    </div>
                    <div class="cad-form-group cad-long">
                        <label for="logradouro" class="required-label">Logradouro</label>
                        <input type="text" id="logradouro" name="logradouro" placeholder="Digite o nome da sua rua" maxlength="100"
                            required>
                    </div>
                </div>

                <div class="cad-form-row">
                    <div class="cad-form-group cad-medium">
                        <label for="bairro" class="required-label">Bairro</label>
                        <input type="text" id="bairro" name="bairro" placeholder="Bairro" maxlength="50" required>
                    </div>
                    <div class="cad-form-group cad-medium">
                        <label for="cidade" class="required-label">Cidade</label>
                        <input type="text" id="cidade" name="cidade" placeholder="Cidade" maxlength="50" required>
                    </div>
                    <div class="cad-form-group cad-short">
                        <label for="uf" class="required-label">UF</label>
                        <select id="uf" name="uf" required>
                            <option value="">Selecione a UF</option>
                            <option value="AC">Acre</option>
                            <option value="AL">Alagoas</option>
                            <option value="AP">Amapá</option>
                            <option value="AM">Amazonas</option>
                            <option value="BA">Bahia</option>
                            <option value="CE">Ceará</option>
                            <option value="DF">Distrito Federal</option>
                            <option value="ES">Espírito Santo</option>
                            <option value="GO">Goiás</option>
                            <option value="MA">Maranhão</option>
                            <option value="MT">Mato Grosso</option>
                            <option value="MS">Mato Grosso do Sul</option>
                            <option value="MG">Minas Gerais</option>
                            <option value="PA">Pará</option>
                            <option value="PB">Paraíba</option>
                            <option value="PR">Paraná</option>
                            <option value="PE">Pernambuco</option>
                            <option value="PI">Piauí</option>
                            <option value="RJ">Rio de Janeiro</option>
                            <option value="RN">Rio Grande do Norte</option>
                            <option value="RS">Rio Grande do Sul</option>
                            <option value="RO">Rondônia</option>
                            <option value="RR">Roraima</option>
                            <option value="SC">Santa Catarina</option>
                            <option value="SP">São Paulo</option>
                            <option value="SE">Sergipe</option>
                            <option value="TO">Tocantins</option>
                        </select>
                    </div>
                </div>

                <div class="cad-form-row">
                    <div class="cad-form-group">
                        <label for="senha" class="required-label">Senha</label>
                        <input type="password" id="senha" name="senha" placeholder="Crie a sua senha" required>
                    </div>
                    <div class="cad-form-group">
                        <label for="confirmar-senha" class="required-label">Confirme a senha</label>
                        <input type="password" id="confirmar-senha" name="confirmar-senha"
                            placeholder="Confirme a sua senha" required>
                    </div>
                </div>
                <div class="cad-form-row cad-special-checkboxes">
                    <div class="cad-form-group-checkbox">
                        <input type="checkbox" id="sou-estudante" name="tipo_usuario_pf">
                        <label for="sou-estudante">Sou estudante</label>
                    </div>
                    <div class="cad-form-group-checkbox">
                        <input type="checkbox" id="nao-sou-estudante" name="tipo_usuario_pf">
                        <label for="nao-sou-estudante">Não sou estudante</label>
                    </div>
                </div>
                <!-- Campos de estudante com a classe 'required-label' e visibilidade controlada pelo JS -->
                <div class="cad-form-group cad-escola-field">
                    <label for="escola" class="required-label">Escola</label>
                    <select id="escola" name="escola">
                        <option value="">Selecione uma Opção</option>
                        <option value="escola_a">Escola A</option>
                        <option value="escola_b">Escola B</option>
                        <option value="escola_c">Escola C</option>
                    </select>
                </div>

                <div class="cad-form-group cad-nivel-escolar-field">
                    <label for="nivel-escolar" class="required-label">Nível Escolar</label>
                    <select id="nivel-escolar" name="nivel-escolar">
                        <option value="">Selecione uma Opção</option>
                        <option value="fundamental">Ensino Fundamental</option>
                        <option value="medio">Ensino Médio</option>
                        <option value="superior">Ensino Superior</option>
                    </select>
                </div>

                <button type="submit" class="create-profile-btn">Criar Perfil</button>
            </form>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <!-- <script src="script.js"></script> -->
</body>

</html>
