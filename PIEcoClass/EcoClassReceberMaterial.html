<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoClassMaterial</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div id="header-placeholder"></div>

    <br>
    <div class="page-container">
        <div class="filter-panel">
            <label for="categoria">Categoria</label>
            <select id="categoria">
                <option>Selecionar Opção</option>
                <option>Escrita</option>
                <option>Cadernos e Papel</option>
                <option>Desenho e Pintura</option>
                <option>Mochilas</option>
                <option>Organização</option>
                <option>Corte e Colagem</option>
                <option>Outros</option>
            </select>

            <label for="material">Material</label>
            <select id="material">
                <option>Selecionar Opção</option>
                <option>Lápis</option>
                <option>Caneta</option>
                <option>Tesoura</option>
                <option>Cola</option>
                <option>Apontador</option>
                <option>Papel</option>
                <option>Pincel</option>
                <option>Calculadora</option>
                <option>Mochila</option>
                <option>Caderno</option>
                <option>Livros</option>
                <option>Outros</option>  
            </select>
        </div>

        <div id="cards-container" class="cards-container">

            

        </div>
    </div>

    <div id="footer-placeholder"></div>

    <div id="modalSolicitacao" class="receber-modal">
        <div class="receber-modal-content">
            <span class="close-modal">&times;</span>
            <div class="receber-container" style="margin-top: 0; box-shadow: none;">
                <form id="solicitacaoFormModal">
                    <label>Categoria</label>
                    <input type="text" id="modal-categoria" readonly>

                    <label>Material</label>
                    <input type="text" id="modal-nome" readonly>

                    <div class="receber-image-upload">
                        <img id="modal-img" src="" class="receber-image-upload">
                    </div>

                    <label>Descrição</label>
                    <textarea id="modal-descricao" readonly></textarea>

                    <label>Estado do Material</label>
                    <div class="receber-stars" id="modal-stars">
                        </div>
                    
                    <button type="submit" class="receber-submit-btn">Solicitar</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
