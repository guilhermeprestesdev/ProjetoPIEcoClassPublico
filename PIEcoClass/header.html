<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>header</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="main-header">
    <div class="header-left">
        <a href="EcoClass.html"><img src="imagens/logo 3.svg" alt="Logo EcoClass" class="header-logo"></a>
    </div>
    <div class="main-nav-div" id="main-nav-div">
        <nav class="main-nav">
            <a href="EcoClass.html" class="nav-item">INÍCIO</a>
            <a href="EcoClassQueroDoar.html" class="nav-item">DOAR</a>
            <a href="EcoClassReceberMaterial.html" class="nav-item">RECEBER</a>
            <a class="nav-item nav-item-with-popup" id="pontuacaoNavLink">PONTUAÇÃO
                <div class="points-popup" id="pointsPopup">
                    <h2>PONTUAÇÃO</h2>
                    <div class="points-summary">
                        <p>Meus pontos: <span class="points-value" id="popupPointsValue">0</span></p>
                        <p>Doações realizadas: <span class="donations-value" id="popupDonationsValue">0</span></p>
                    </div>
                    </div>
            </a>
        </nav>
    </div>
    <div class="header-right">
        <div class="login-info" id="loginInfo">
            <div class="login-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#FFFFFF">
                    <path d="M12 4a4 4 0 0 1 4 4 4 4 0 0 1-4 4 4 4 0 0 1-4-4 4 4 0 0 1 4-4m0 10c4.42 0 8 1.79 8 4v2H4v-2c0-2.21 3.58-4 8-4z" />
                </svg>
            </div>
            <div class="user-details">
                <span class="user-name" id="userNameDisplay">USUÁRIO</span>
                <span class="user-points" id="userPointsDisplay">PONTOS: 0</span>
            </div>
        </div>

        <div class="login-popup" id="loginPopup">
            <h2>Acessar Minha Conta</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="login-username">CPF/CNPJ</label>
                    <input type="text" id="login-username" name="username" placeholder="Digite seu CPF/CNPJ" required>
                </div>
                <div class="form-group">
                    <label for="login-password">SENHA</label>
                    <input type="password" id="login-password" name="password" placeholder="Digite sua Senha" required>
                </div>
                <button type="submit" class="login-submit-btn">ENTRAR</button>
                <p class="signup-link">Não tem conta? <a href="Cad_PF.html">Cadastre-se</a></p>
                <p id="loginError" style="color:red; font-weight:bold; margin-top:10px; display:none;">CPF ou senha incorretos.</p>
            </form>
        </div>
    </div>
</header>
</body>

</html>
