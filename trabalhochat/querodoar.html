<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Material</title>
  <link rel="stylesheet" href="querodoar.css">
</head>
<body>

  <div class="form-container">
    <div class="image-upload">
        <img src="https://img.icons8.com/ios/50/camera--v1.png" alt="camera" class="camera-icon">
      <p>Clique ou arraste para adicionar imagem</p>
      <form action="/upload" method="post" enctype="multipart/form-data">
    <label for="imagem">Adicione uma imagem:</label>
    <input type="file" id="imagem" name="imagem" accept="image/*">
    <button type="submit">Enviar</button>
</form>
    </div>

    <label for="categoria">Categoria</label>
    <select id="categoria">
      <option>Selecionar Opção</option>
      <option>Cadernos</option>
      <option>Lápis e canetas</option>
      <option>Materiais artísticos</option>
      <option>Materiais de escrita</option>
      <option>Mochilas e estojos</option>
    </select>

    <label for="nome">Nome</label>
    <input type="text" id="nome" placeholder="Ex: Lápis de Escrever">

    <label for="descricao">Descrição</label>
    <textarea id="descricao" placeholder="Ex: Lápis de Escrever Faber Castell Nº2 com Borracha"></textarea>

    <label for="estado">Estado do Material</label>
    <div class="stars">
    <span class="star" data-value="1">★</span>
    <span class="star" data-value="2">★</span>
    <span class="star" data-value="3">★</span>
    <span class="star" data-value="4">★</span>
    <span class="star" data-value="5">★</span>
  </div>

    <label for="ponto">Ponto de Entrega</label>
    <select id="ponto">
      <option>Selecionar Opção</option>
      <option>Escola José Bonifácio</option>
      <option>Mantovani</option>
      <option>Haidee</option>
    </select>

    <button class="submit-btn">Cadastrar</button>
  </div>
 <script>
    const stars = document.querySelectorAll('.star');

    stars.forEach(star => {
      star.addEventListener('click', () => {
        const value = parseInt(star.getAttribute('data-value'));

        stars.forEach((s, index) => {
          if (index < value) {
            s.classList.add('filled');
          } else {
            s.classList.remove('filled');
          }
        });
      });
    });
  </script>
</body>
</html>
