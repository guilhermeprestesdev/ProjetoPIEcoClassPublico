<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitação de Material</title>
  <link rel="stylesheet" href="precisoreceber.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <form>
      <label for="categoria">Categoria</label>
      <select id="categoria" name="categoria">
        <option>Escrita</option>
      </select>

      <label for="material">Material</label>
      <select id="material" name="material">
        <option>Lápis</option>
      </select>

      <div class="image-upload">
         <img src="https://images.hellomagazine.com/horizon/original_aspect_ratio/e54e307f9f98-crayons-a.jpg?tx=c_limit,w_960" alt="Imagem"width="310" height="200">
      </div>

      <textarea placeholder="o material está em bom estado, porém falta algumas cores. "></textarea>

   <label for="estado">Estado do Material</label>
    <div class="stars">
     <div class="rating">★ ★ ★ ★ ☆</div>
  </div>
      <button type="submit">Solicitar</button>
    </form>
  </div>
</body>
</html>
